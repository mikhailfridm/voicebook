version: "3.8"

services:
  voicebook:
    build: .
    container_name: voicebook
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - vllm
      - fish-tts
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  vllm:
    build:
      context: ./inference
      dockerfile: Dockerfile.vllm
    container_name: voicebook-vllm
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  fish-tts:
    image: fishaudio/fish-speech:latest-server-cuda
    container_name: voicebook-fish-tts
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./models/fish-speech:/app/checkpoints
      - ./models/fish-voices:/app/references
    environment:
      - COMPILE=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  nginx:
    image: nginx:alpine
    container_name: voicebook-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - voicebook
