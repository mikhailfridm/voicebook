### LLaMA-Factory fine-tune config for VoiceBook
### Usage: llamafactory-cli train config.yaml

### Model
model_name_or_path: Qwen/Qwen2.5-14B-Instruct
trust_remote_code: true

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
lora_dropout: 0.05

### Dataset
dataset_dir: /workspace/voicebook/training/dataset/processed
dataset: train
eval_dataset: eval
template: qwen
cutoff_len: 2048

### Training
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
logging_steps: 10
save_steps: 100
eval_steps: 100

### Eval
per_device_eval_batch_size: 4
eval_strategy: steps

### Output
output_dir: /workspace/voicebook/models/voicebook-lora
overwrite_output_dir: true
report_to: none
